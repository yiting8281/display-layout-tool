<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展場陳列與價格排版示意工具</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6;
        }
        .card-element {
            touch-action: none;
            user-select: none;
            position: absolute;
            box-sizing: border-box;
        }
        .card-element.selected {
            outline: 2px solid #2563eb;
            box-shadow: 0 0 8px rgba(37, 99, 235, 0.5);
        }
        .canvas-bg {
            background-size: 20px 20px;
            background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px),
                              linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="bg-slate-800 text-white px-6 py-3 flex justify-between items-center shadow-md shrink-0">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-bold tracking-wider">展場陳列與價格排版示意工具</span>
            <span class="text-xs bg-emerald-600 text-white px-2 py-0.5 rounded-full">美工示意圖專用</span>
        </div>
        <button id="btn-export" class="bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-white px-4 py-2 rounded-lg font-medium shadow flex items-center space-x-2 transition cursor-pointer">
            <span>💾 導出示意圖 (PNG)</span>
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-white border-r border-gray-200 p-4 flex flex-col space-y-6 overflow-y-auto shrink-0">
            <div>
                <h3 class="font-bold text-gray-700 text-sm uppercase tracking-wider mb-3 pb-1 border-b border-gray-100">
                    🖼️ 1. 畫布尺寸（外框）
                </h3>
                <div class="mb-3">
                    <label class="block text-xs text-gray-500 font-medium mb-1">選擇常用尺寸</label>
                    <select id="select-canvas-preset" class="w-full bg-gray-50 border border-gray-300 text-gray-700 rounded-md p-2 text-sm focus:outline-none">
                        <option value="90x30">櫃位後鐵網 A (90 x 30 cm)</option>
                        <option value="120x60">大型陳列架 B (120 x 60 cm)</option>
                        <option value="60x40">中型展示櫃 C (60 x 40 cm)</option>
                        <option value="100x100">正方形展板 D (100 x 100 cm)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <div>
                        <label class="block text-xs text-gray-500 font-medium mb-1">寬度 (cm)</label>
                        <input type="number" id="input-canvas-w" value="90" class="w-full bg-gray-50 border border-gray-300 rounded-md p-1.5 text-sm text-center">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500 font-medium mb-1">高度 (cm)</label>
                        <input type="number" id="input-canvas-h" value="30" class="w-full bg-gray-50 border border-gray-300 rounded-md p-1.5 text-sm text-center">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="block text-xs text-gray-500 font-medium mb-1">自訂尺寸名稱</label>
                    <input type="text" id="input-canvas-name" value="櫃台後鐵網A" class="w-full bg-gray-50 border border-gray-300 rounded-md p-1.5 text-sm">
                </div>
                <button id="btn-save-canvas-preset" class="w-full bg-slate-600 hover:bg-slate-700 text-white text-xs py-2 rounded font-medium transition cursor-pointer">
                    📌 儲存此尺寸至常用列表
                </button>
            </div>

            <div>
                <h3 class="font-bold text-gray-700 text-sm uppercase tracking-wider mb-3 pb-1 border-b border-gray-100">
                    🏷️ 2. 新增卡牌（商品字卡）
                </h3>
                <div class="space-y-2">
                    <button class="btn-add-card w-full text-left bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-800 p-2.5 rounded-lg text-xs font-medium transition flex justify-between items-center cursor-pointer" 
                            data-w="15" data-h="20" data-title="Race Belt 號碼帶" data-promo="420" data-orig="500" data-note="展場價">
                        <div>
                            <span class="font-bold block">📄 號碼帶卡牌 (大)</span>
                            <span class="text-gray-500 font-normal">預設尺寸：15 x 20 cm</span>
                        </div>
                        <span class="bg-blue-200 px-1.5 py-0.5 rounded text-[10px]">新增</span>
                    </button>
                    <button class="btn-add-card w-full text-left bg-amber-50 hover:bg-amber-100 border border-amber-200 text-amber-800 p-2.5 rounded-lg text-xs font-medium transition flex justify-between items-center cursor-pointer" 
                            data-w="12" data-h="12" data-title="UNIQ 手腕帶" data-promo="380" data-orig="450" data-note="展場價">
                        <div>
                            <span class="font-bold block">⏹️ 手腕/頭帶卡牌 (中)</span>
                            <span class="text-gray-50
